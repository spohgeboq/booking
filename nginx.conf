# ============================================
# Главный Nginx Reverse Proxy
# Маршрутизация трафика между сервисами
# ============================================

# Ограничение частоты запросов к API (защита от брутфорса)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# --- Порт 80: Основной клиентский сайт + API ---
server {
    listen 80;
    server_name _;

    server_tokens off;

    # Безопасность: ограничение размера тела запроса
    client_max_body_size 10M;

    # Безопасность: таймауты
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Общие заголовки для проксирования
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API: проксирование к бэкенду
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://backend:5000;

        # Безопасность: скрываем внутренние заголовки
        proxy_hide_header X-Powered-By;
    }

    # API auth: усиленная защита от брутфорса
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;

        proxy_pass http://backend:5000;
        proxy_hide_header X-Powered-By;
    }

    # Загруженные файлы (аватары, изображения)
    location /uploads/ {
        proxy_pass http://backend:5000;
        proxy_hide_header X-Powered-By;

        # Кэширование загруженных файлов
        proxy_cache_valid 200 1h;
        expires 1h;
    }

    # Основной сайт: проксирование к booking-frontend
    location / {
        proxy_pass http://booking-site:80;
    }
}

# --- Порт 8080: Админ-панель ---
server {
    listen 8080;
    server_name _;

    server_tokens off;

    client_max_body_size 10M;

    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API: проксирование к бэкенду
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://backend:5000;
        proxy_hide_header X-Powered-By;
    }

    # API auth: усиленная защита от брутфорса
    location /api/auth/ {
        limit_req zone=auth_limit burst=3 nodelay;

        proxy_pass http://backend:5000;
        proxy_hide_header X-Powered-By;
    }

    # Загруженные файлы
    location /uploads/ {
        proxy_pass http://backend:5000;
        proxy_hide_header X-Powered-By;
        expires 1h;
    }

    # Админ-панель
    location / {
        proxy_pass http://admin-panel:80;
    }
}
