# ============================================
# Docker Compose — Production Deployment
# Все сервисы на одном VPS
# ============================================

services:
  # --- База данных PostgreSQL ---
  db:
    image: postgres:15-alpine
    container_name: booking-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    # БД НЕ открывается наружу — доступна только внутри Docker-сети
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Безопасность: ограничение ресурсов
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # --- Backend (Node.js + Prisma) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: booking-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_GROUP_ID: ${TELEGRAM_GROUP_ID}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL}
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # --- Booking Frontend (Клиентский сайт) ---
  booking-site:
    build:
      context: ./booking-frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BOOKING_BACKEND_URL}
        VITE_ADMIN_URL: ${VITE_ADMIN_URL}
    container_name: booking-site
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # --- Admin Panel (Админ-панель) ---
  admin-panel:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_ADMIN_BACKEND_URL}
        VITE_CLIENT_URL: ${VITE_CLIENT_URL}
    container_name: admin-panel
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  # --- Nginx Reverse Proxy ---
  nginx-proxy:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      - booking-site
      - admin-panel
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

# --- Volumes ---
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

# --- Networks ---
networks:
  internal:
    driver: bridge
    # Безопасность: изолированная сеть
    internal: false
